<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis Orbit Simulation für Astro_F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            overflow: hidden; /* Prevent scrolling */
            touch-action: none; /* Better touch handling */
        }
        #simulation-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        canvas {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
            box-sizing: border-box;
        }
        .ui-panel {
            pointer-events: auto;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            border: 2px solid #334155;
            padding: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 600px; /* Verbreitert für mehr Knöpfe */
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.6rem;
            border-radius: 0.5rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            color: white;
            font-size: 1rem;
            line-height: 1.2;
        }
        .btn:active { transform: scale(0.95); }
        
        /* Farben für die Knöpfe */
        .btn-blue { background-color: #3b82f6; box-shadow: 0 4px 0 #2563eb; }
        .btn-blue:hover { background-color: #60a5fa; }
        .btn-blue:active { box-shadow: 0 0 0 #2563eb; transform: translateY(4px); }
        
        .btn-green { background-color: #10b981; box-shadow: 0 4px 0 #059669; }
        .btn-green:hover { background-color: #34d399; }
        .btn-green:active { box-shadow: 0 0 0 #059669; transform: translateY(4px); }

        .btn-purple { background-color: #9333ea; box-shadow: 0 4px 0 #7e22ce; }
        .btn-purple:hover { background-color: #a855f7; }
        .btn-purple:active { box-shadow: 0 0 0 #7e22ce; transform: translateY(4px); }

        .btn-orange { background-color: #f97316; box-shadow: 0 4px 0 #c2410c; }
        .btn-orange:hover { background-color: #fb923c; }
        .btn-orange:active { box-shadow: 0 0 0 #c2410c; transform: translateY(4px); }

        .btn-red { background-color: #ef4444; box-shadow: 0 4px 0 #dc2626; }
        .btn-red:hover { background-color: #f87171; }
        .btn-red:active { box-shadow: 0 0 0 #dc2626; transform: translateY(4px); }

        #status-message {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(245, 158, 11, 0.9);
            color: #fff;
            padding: 10px 25px;
            border-radius: 999px;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            animation: pulse 2s infinite;
            text-align: center;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        @media (max-width: 768px) {
            .ui-panel { max-width: 100%; width: 100%; margin-bottom: 0.5rem; }
            .title-panel { display: none; }
        }
    </style>
</head>
<body>

<div id="simulation-container">
    <canvas id="spaceCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="ui-panel title-panel">
            <h1 class="text-2xl font-black text-blue-400 mb-2">🚀 Artemis Orbit Simulator</h1>
            <p class="text-sm text-slate-300">
                Hallo Felix! Beobachte die Raumkapsel. Du kannst jetzt nicht nur <strong>Gas geben</strong>, 
                sondern auch <strong>Bremsen</strong>, um auf der Erde zu landen!
            </p>
        </div>

        <div id="status-message">Warte auf den richtigen Moment... ⏳</div>

        <button id="ui-toggle-btn" class="pointer-events-auto absolute bottom-4 right-4 z-50 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-full shadow-lg border border-slate-500 font-bold transition-all" onclick="toggleUI()">
            🔽 Menü ausblenden
        </button>

        <div id="control-panels" class="mt-auto flex flex-col md:flex-row gap-4 w-full items-end justify-between pointer-events-none transition-all duration-300 pb-12 md:pb-0">
            
            <div class="ui-panel pointer-events-auto flex-1 w-full">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold text-slate-100">Missions-Kontrolle:</h2>
                    <button class="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1 rounded shadow" onclick="resetSimulation()">
                        🔄 Neu starten
                    </button>
                </div>
                
                <div class="mb-3 bg-slate-800/80 p-3 rounded-lg border border-slate-600">
                    <label for="thrustPower" class="block text-sm font-bold text-slate-200 mb-2">
                        ⚙️ Triebwerks-Stärke: <span id="thrustDisplay" class="text-blue-400">40%</span>
                    </label>
                    <input type="range" id="thrustPower" min="5" max="100" value="40" class="w-full accent-blue-500 cursor-pointer">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Gruppe: Niedrigster Punkt -->
                    <div class="bg-slate-800/50 p-2 rounded border border-slate-700">
                        <p class="text-xs text-slate-400 font-bold mb-2 text-center uppercase tracking-wider">Am niedrigsten Punkt</p>
                        <button class="btn btn-green mb-2" onclick="scheduleBurn('periapsis', 1)">
                            🚀 Gas geben<br>
                            <span class="text-xs font-normal opacity-80">(Zieht Orbit ins All)</span>
                        </button>
                        <button class="btn btn-orange" onclick="scheduleBurn('periapsis', -1)">
                            🛑 Bremsen<br>
                            <span class="text-xs font-normal opacity-80">(Zieht Orbit rein)</span>
                        </button>
                    </div>

                    <!-- Gruppe: Höchster Punkt -->
                    <div class="bg-slate-800/50 p-2 rounded border border-slate-700">
                        <p class="text-xs text-slate-400 font-bold mb-2 text-center uppercase tracking-wider">Am höchsten Punkt</p>
                        <button class="btn btn-blue mb-2" onclick="scheduleBurn('apoapsis', 1)">
                            🚀 Gas geben<br>
                            <span class="text-xs font-normal opacity-80">(Hebt Orbit an)</span>
                        </button>
                        <button class="btn btn-purple" onclick="scheduleBurn('apoapsis', -1)">
                            🛑 Bremsen<br>
                            <span class="text-xs font-normal opacity-80 text-yellow-300">(Für die Landung!)</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    const statusMsg = document.getElementById('status-message');

    // --- Physics & Simulation Variables ---
    const G_M = 8000;
    const earthRadius = 40;
    
    let scale = 1;
    let targetScale = 1;
    let cameraX = 0;
    let cameraY = 0;

    let ship = {};
    let predictedPath = [];
    let apoapsis = { x: 0, y: 0, dist: 0 };
    let periapsis = { x: 0, y: 0, dist: 0 };
    let crashPoint = null; // Speichert den Ort der vorausberechneten Landung

    // Burn state
    let scheduledBurnPoint = null; // 'apoapsis', 'periapsis', or null
    let burnDirection = 1;         // 1 (Gas geben / Prograde), -1 (Bremsen / Retrograde)
    let isBurning = false;
    let burnTimer = 0;
    const BURN_DURATION = 60; // Frames
    const MAX_BURN_FORCE = 0.08;
    let currentThrustPower = 0.4;
    
    let isLanded = false;
    let previousDotProduct = 0;

    // UI State
    let uiVisible = true;
    function toggleUI() {
        const panels = document.getElementById('control-panels');
        const btn = document.getElementById('ui-toggle-btn');
        uiVisible = !uiVisible;
        if (uiVisible) {
            panels.style.transform = 'translateY(0)';
            panels.style.opacity = '1';
            btn.innerHTML = '🔽 Menü ausblenden';
        } else {
            panels.style.transform = 'translateY(150%)'; 
            panels.style.opacity = '0';
            btn.innerHTML = '⚙️ Menü anzeigen';
        }
    }

    function resetSimulation() {
        const startDist = 120;
        const startVelocity = Math.sqrt(G_M / startDist) * 1.15; // Elliptisch

        ship = {
            x: 0,
            y: -startDist,
            vx: startVelocity,
            vy: 0,
            rotation: 0
        };

        scheduledBurnPoint = null;
        isBurning = false;
        isLanded = false;
        crashPoint = null;
        statusMsg.style.display = 'none';
        statusMsg.style.animation = 'pulse 2s infinite';
        
        if (!uiVisible) toggleUI(); // Menü wiederholen
        updatePathPrediction();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cameraX = canvas.width / 2;
        cameraY = canvas.height / 2;
    }
    window.addEventListener('resize', resize);

    // --- Interaction ---
    function scheduleBurn(point, direction) {
        if (isBurning || isLanded) return;
        
        scheduledBurnPoint = point;
        burnDirection = direction;
        
        let actionText = direction === 1 ? 'Gas geben' : 'Bremsen';
        let pointText = point === 'periapsis' ? 'niedrigsten Punkt' : 'höchsten Punkt';
        
        statusMsg.innerHTML = `Autopilot: Warte aufs ${actionText} am ${pointText}... ⏱️`;
        statusMsg.style.display = 'block';
        statusMsg.style.backgroundColor = direction === 1 ? 'rgba(245, 158, 11, 0.9)' : 'rgba(168, 85, 247, 0.9)'; 

        // UI automatisch ausblenden für freie Sicht!
        if (uiVisible) toggleUI();
    }

    function startBurn() {
        scheduledBurnPoint = null;
        isBurning = true;
        burnTimer = BURN_DURATION;
        
        if (burnDirection === 1) {
            statusMsg.innerHTML = '🔥 Triebwerke gezündet! Orbit wird vergrößert...';
            statusMsg.style.backgroundColor = 'rgba(239, 68, 68, 0.9)'; // Rot
        } else {
            statusMsg.innerHTML = '🛑 Brems-Triebwerke gezündet! Orbit wird verkleinert...';
            statusMsg.style.backgroundColor = 'rgba(168, 85, 247, 0.9)'; // Lila
        }
    }

    // --- Physics Engine ---
    function calculateAcceleration(x, y) {
        const r2 = x*x + y*y;
        const r = Math.sqrt(r2);
        const a = -G_M / r2;
        return {
            ax: a * (x / r),
            ay: a * (y / r)
        };
    }

    function updatePhysics() {
        if (isLanded) return; // Schiff bewegt sich nicht mehr

        // Lande-Erkennung (Kollision mit der Erde)
        const currentDist = Math.sqrt(ship.x*ship.x + ship.y*ship.y);
        if (currentDist <= earthRadius) {
            isLanded = true;
            isBurning = false;
            ship.vx = 0;
            ship.vy = 0;
            
            // Lande-Erfolgsmeldung
            statusMsg.innerHTML = '🌍 Erfolgreich auf der Erde gelandet!<br><span style="font-size:0.8em;font-weight:normal;">Willkommen zu Hause, Astronaut Felix!</span>';
            statusMsg.style.display = 'block';
            statusMsg.style.backgroundColor = 'rgba(16, 185, 129, 0.95)'; // Grün
            statusMsg.style.animation = 'none'; // Pulsieren stoppen
            
            if (!uiVisible) toggleUI();
            return;
        }

        const dt = 1;
        let acc1 = calculateAcceleration(ship.x, ship.y);
        
        // Thrust anwenden (vorwärts oder rückwärts)
        if (isBurning) {
            const speed = Math.sqrt(ship.vx*ship.vx + ship.vy*ship.vy);
            const appliedForce = MAX_BURN_FORCE * currentThrustPower * burnDirection;
            acc1.ax += (ship.vx / speed) * appliedForce;
            acc1.ay += (ship.vy / speed) * appliedForce;
            
            burnTimer--;
            if (burnTimer <= 0) {
                isBurning = false;
                statusMsg.style.display = 'none';
                updatePathPrediction();
            }
        }

        ship.x += ship.vx * dt + 0.5 * acc1.ax * dt * dt;
        ship.y += ship.vy * dt + 0.5 * acc1.ay * dt * dt;

        let acc2 = calculateAcceleration(ship.x, ship.y);
        if (isBurning) {
            const speed = Math.sqrt(ship.vx*ship.vx + ship.vy*ship.vy);
            const appliedForce = MAX_BURN_FORCE * currentThrustPower * burnDirection;
            acc2.ax += (ship.vx / speed) * appliedForce;
            acc2.ay += (ship.vy / speed) * appliedForce;
        }

        ship.vx += 0.5 * (acc1.ax + acc2.ax) * dt;
        ship.vy += 0.5 * (acc1.ay + acc2.ay) * dt;

        ship.rotation = Math.atan2(ship.vy, ship.vx);

        // Autopilot Check
        const dotProduct = ship.x * ship.vx + ship.y * ship.vy;
        if (scheduledBurnPoint && !isBurning) {
            if (previousDotProduct < 0 && dotProduct >= 0) {
                if (scheduledBurnPoint === 'periapsis') startBurn();
            } else if (previousDotProduct > 0 && dotProduct <= 0) {
                if (scheduledBurnPoint === 'apoapsis') startBurn();
            }
        }
        previousDotProduct = dotProduct;
    }

    // --- Orbit Prediction ---
    function updatePathPrediction() {
        if (isLanded) {
            predictedPath = [];
            return;
        }

        predictedPath = [];
        crashPoint = null;
        let px = ship.x, py = ship.y;
        let pvx = ship.vx, pvy = ship.vy;
        
        let maxD = 0;
        let minD = Infinity;
        
        apoapsis = {x: 0, y: 0, dist: 0};
        periapsis = {x: 0, y: 0, dist: 0};

        const dt = 1.5;
        
        for (let i = 0; i < 2000; i++) {
            let acc1 = calculateAcceleration(px, py);
            let next_px = px + pvx * dt + 0.5 * acc1.ax * dt * dt;
            let next_py = py + pvy * dt + 0.5 * acc1.ay * dt * dt;
            
            let acc2 = calculateAcceleration(next_px, next_py);
            pvx += 0.5 * (acc1.ax + acc2.ax) * dt;
            pvy += 0.5 * (acc1.ay + acc2.ay) * dt;
            
            px = next_px;
            py = next_py;

            predictedPath.push({x: px, y: py});

            let dist = Math.sqrt(px*px + py*py);
            
            // Vorhersage: Berühren wir die Erde?
            if (dist <= earthRadius) {
                crashPoint = {x: px, y: py};
                break; // Vorhersage stoppt bei Landung
            }

            if (dist > maxD) { maxD = dist; apoapsis = {x: px, y: py, dist: dist}; }
            if (dist < minD) { minD = dist; periapsis = {x: px, y: py, dist: dist}; }

            if (i > 50) {
                let startDist = Math.sqrt((px - ship.x)**2 + (py - ship.y)**2);
                if (startDist < Math.sqrt(pvx*pvx + pvy*pvy) * dt * 2) {
                    break; 
                }
            }
            if (dist > 3000) break;
        }
    }

    // --- Rendering ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(cameraX, cameraY);
        ctx.scale(scale, scale);

        // 1. Vorhersage-Linie
        if (predictedPath.length > 1) {
            ctx.beginPath();
            ctx.moveTo(ship.x, ship.y);
            for (let pt of predictedPath) {
                ctx.lineTo(pt.x, pt.y);
            }
            // Wenn eine Landung vorausgesagt ist, färbe das letzte Stück leicht rötlich
            ctx.strokeStyle = crashPoint ? 'rgba(239, 68, 68, 0.6)' : 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2 / scale;
            ctx.setLineDash([10 / scale, 10 / scale]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // 2. Marker (Apoapsis / Periapsis / Landung)
        ctx.font = `${14/scale}px Nunito`;
        ctx.textAlign = 'center';

        if (!crashPoint && apoapsis.dist > 0 && apoapsis.dist < 3000 && !isLanded) {
            ctx.fillStyle = '#60a5fa';
            ctx.beginPath(); ctx.arc(apoapsis.x, apoapsis.y, 6 / scale, 0, Math.PI*2); ctx.fill();
            ctx.fillText("Höchster Punkt", apoapsis.x, apoapsis.y - 12/scale);
        }

        if (!crashPoint && periapsis.dist > earthRadius && !isLanded) {
            ctx.fillStyle = '#34d399';
            ctx.beginPath(); ctx.arc(periapsis.x, periapsis.y, 6 / scale, 0, Math.PI*2); ctx.fill();
            ctx.fillText("Niedrigster Punkt", periapsis.x, periapsis.y + 20/scale);
        }

        // Landepunkt markieren, wenn er vorausberechnet wurde
        if (crashPoint && !isLanded) {
            ctx.fillStyle = '#ef4444'; // Rot
            ctx.beginPath(); ctx.arc(crashPoint.x, crashPoint.y, 6 / scale, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.fillText("📍 Ziel: Landung!", crashPoint.x, crashPoint.y - 15/scale);
        }

        // 3. Erde zeichnen
        const earthGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, earthRadius);
        earthGradient.addColorStop(0, '#3b82f6');
        earthGradient.addColorStop(0.8, '#1d4ed8');
        earthGradient.addColorStop(1, '#1e3a8a');

        ctx.beginPath();
        ctx.arc(0, 0, earthRadius, 0, Math.PI*2);
        ctx.fillStyle = earthGradient;
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(0, 0, earthRadius + 5, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
        ctx.fill();

        // 4. Raumschiff zeichnen
        ctx.save();
        ctx.translate(ship.x, ship.y);
        
        // Wenn gelandet, zeige das Schiff aufrecht auf der Oberfläche
        if (isLanded) {
            ctx.rotate(Math.atan2(ship.y, ship.x) + Math.PI/2);
        } else {
            ctx.rotate(ship.rotation);
        }

        // Flammen zeichnen
        if (isBurning) {
            ctx.fillStyle = Math.random() > 0.5 ? '#f59e0b' : '#ef4444';
            ctx.beginPath();
            if (burnDirection === 1) {
                // Hinten (Gas geben)
                ctx.moveTo(-10, -5);
                ctx.lineTo(-30 - Math.random()*15, 0);
                ctx.lineTo(-10, 5);
            } else {
                // Vorne (Bremsen)
                ctx.moveTo(15, -3);
                ctx.lineTo(35 + Math.random()*15, 0);
                ctx.lineTo(15, 3);
            }
            ctx.closePath();
            ctx.fill();
        }

        // Schiffskörper
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(15, 0);
        ctx.lineTo(-10, 8);
        ctx.lineTo(-10, -8);
        ctx.closePath();
        ctx.fill();
        
        // Solar-Panels
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(-5, 8, 8, 12);
        ctx.fillRect(-5, -20, 8, 12);

        ctx.restore();
        ctx.restore();
    }

    // --- Main Game Loop ---
    let frameCount = 0;
    function loop() {
        updatePhysics();
        
        if (isBurning || frameCount % 30 === 0) {
            updatePathPrediction();
        }

        // Auto-Zoom
        let requiredRadius = 150;
        if (apoapsis && apoapsis.dist > 0) requiredRadius = Math.max(requiredRadius, apoapsis.dist);
        let shipDist = Math.sqrt(ship.x * ship.x + ship.y * ship.y);
        requiredRadius = Math.max(requiredRadius, shipDist);

        const padding = window.innerWidth < 768 ? 2.0 : 1.4; 
        const minDimension = Math.min(canvas.width, canvas.height);
        let calculatedScale = (minDimension / 2) / (requiredRadius * padding);

        const maxAllowedScale = window.innerWidth < 768 ? 0.8 : 1.2;
        
        // Wenn gelandet, ganz nah an die Erde ranzoomen
        if (isLanded) {
            targetScale = maxAllowedScale * 1.5;
        } else {
            targetScale = Math.min(Math.max(calculatedScale, 0.02), maxAllowedScale);
        }

        scale += (targetScale - scale) * 0.03;

        draw();
        frameCount++;
        requestAnimationFrame(loop);
    }

    // UI Event Listeners
    document.getElementById('thrustPower').addEventListener('input', (e) => {
        document.getElementById('thrustDisplay').innerText = e.target.value + '%';
        currentThrustPower = e.target.value / 100;
    });

    resize();
    resetSimulation();
    loop();

</script>
</body>
</html>
